<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context_OS — BTTF Overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        overflow: hidden;
        font-family: 'Arial Narrow', 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      .skin-root {
        position: relative;
        width: 490px;
        height: 260px;
      }

      /* Main skin shape */
      .skin-bg {
        position: absolute;
        inset: 0;
        background: url('../mainback.png') no-repeat center center;
        background-size: contain;
        z-index: 10;
        pointer-events: none;
      }

      /* Main display area — the scrolling text strip at top */
      .display-area {
        position: absolute;
        left: 160px;
        top: 14px;
        width: 140px;
        height: 16px;
        z-index: 5;
        overflow: hidden;
        display: flex;
        align-items: center;
      }

      .display-text {
        font-size: 7px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
        white-space: nowrap;
        animation: scroll-bttf 10s linear infinite;
      }

      @keyframes scroll-bttf {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      /* Time display — right side of top bar */
      .time-display {
        position: absolute;
        left: 300px;
        top: 13px;
        width: 60px;
        height: 16px;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .time-text {
        font-size: 7px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
        letter-spacing: 0.05em;
      }

      /* Seek bar area — the orange progress strip */
      .seek-area {
        position: absolute;
        left: 86px;
        top: 57px;
        width: 285px;
        height: 8px;
        z-index: 5;
      }

      .seek-bg {
        width: 100%;
        height: 100%;
        background: rgba(80, 80, 80, 0.5);
        position: relative;
        overflow: hidden;
      }

      .seek-fill {
        height: 100%;
        background: linear-gradient(90deg, #f5a623, #f7c948);
        box-shadow: 0 0 6px rgba(245, 166, 35, 0.4);
        transition: width 0.6s ease;
      }

      /* Volume area — right side slider */
      .vol-area {
        position: absolute;
        left: 300px;
        top: 57px;
        width: 70px;
        height: 8px;
        z-index: 5;
      }

      /* Data readout — the DeLorean "time circuit" style */
      .circuit-panel {
        position: absolute;
        left: 70px;
        top: 32px;
        width: 320px;
        height: 20px;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 4px;
        padding: 0 8px;
      }

      .circuit-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0px;
      }

      .circuit-label {
        font-size: 4.5px;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #f5a623;
        text-shadow: 0 0 4px rgba(245, 166, 35, 0.3);
      }

      .circuit-value {
        font-size: 7px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
        letter-spacing: 0.05em;
      }

      /* Status dots in the transport area */
      .transport-status {
        position: absolute;
        left: 80px;
        top: 82px;
        width: 300px;
        height: 15px;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px;
      }

      .status-dot {
        width: 4px;
        height: 4px;
        flex-shrink: 0;
      }

      .status-label {
        font-size: 5px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #adaaaa;
      }

      .status-highlight {
        color: #f5a623;
        text-shadow: 0 0 4px rgba(245, 166, 35, 0.3);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .blink {
        animation: blink 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="skin-root" id="root">
      <!-- Scrolling metadata display -->
      <div class="display-area">
        <span class="display-text" id="display-scroll">
          CONTEXT_OS V3.0.1 &nbsp;&bull;&nbsp; MEMORY PIPELINE ACTIVE
          &nbsp;&bull;&nbsp; CONTEXT_OS V3.0.1 &nbsp;&bull;&nbsp; MEMORY
          PIPELINE ACTIVE &nbsp;&bull;&nbsp;
        </span>
      </div>

      <!-- Time / episode counter -->
      <div class="time-display">
        <span class="time-text" id="time-readout">0 / 160</span>
      </div>

      <!-- Time circuit data readout -->
      <div class="circuit-panel">
        <div class="circuit-block">
          <span class="circuit-label">SHORT</span>
          <span class="circuit-value" id="c-short">0</span>
        </div>
        <div class="circuit-block">
          <span class="circuit-label">LONG</span>
          <span class="circuit-value" id="c-long">0</span>
        </div>
        <div class="circuit-block">
          <span class="circuit-label">RETRIEVER</span>
          <span class="circuit-value" id="c-retriever">--</span>
        </div>
        <div class="circuit-block">
          <span class="circuit-label">ASSEMBLER</span>
          <span class="circuit-value" id="c-assembler">--</span>
        </div>
        <div class="circuit-block">
          <span class="circuit-label">PINNED</span>
          <span class="circuit-value" id="c-pinned">0</span>
        </div>
      </div>

      <!-- Seek bar = memory capacity fill -->
      <div class="seek-area">
        <div class="seek-bg">
          <div class="seek-fill" id="capacity-bar" style="width: 0%"></div>
        </div>
      </div>

      <!-- Transport area status -->
      <div class="transport-status">
        <div class="status-dot" id="dot-key" style="background: #ff716c"></div>
        <span class="status-label" id="label-key">NO KEY</span>
        <div class="status-dot" style="background: #484848"></div>
        <span class="status-label" id="label-companion">COMPANION: N/A</span>
        <div class="status-dot blink" style="background: #f5a623"></div>
        <span class="status-label status-highlight" id="label-status"
          >INITIALIZING</span
        >
      </div>

      <!-- Skin shape -->
      <div class="skin-bg"></div>
    </div>

    <script>
      async function fetchData() {
        try {
          const stats = await chrome.runtime.sendMessage({
            type: 'getMemoryStats',
          });
          if (stats && stats.success) {
            const recent = stats.recentEpisodes || [];
            document.getElementById('time-readout').textContent =
              stats.episodeCount + ' / ' + stats.maxEpisodes;
            document.getElementById('c-short').textContent = recent.length;
            document.getElementById('c-long').textContent = stats.episodeCount;
            document.getElementById('c-pinned').textContent =
              stats.pinnedTabCount || 0;

            const pct = (stats.episodeCount / stats.maxEpisodes) * 100;
            document.getElementById('capacity-bar').style.width = pct + '%';

            const scroll = document.getElementById('display-scroll');
            const line =
              'CONTEXT_OS \u00a0\u2022\u00a0 EPISODES: ' +
              stats.episodeCount +
              ' \u00a0\u2022\u00a0 RECENT: ' +
              recent.length +
              ' \u00a0\u2022\u00a0 PINNED: ' +
              (stats.pinnedTabCount || 0) +
              ' \u00a0\u2022\u00a0 ';
            scroll.textContent = line + line;

            document.getElementById('label-status').textContent = 'NOMINAL';
          }
        } catch (e) {}

        try {
          const snap = await chrome.runtime.sendMessage({
            type: 'getContextSnapshot',
          });
          if (snap && snap.success && snap.snapshot) {
            const s = snap.snapshot;
            document.getElementById('c-retriever').textContent =
              s.retrievedEpisodes.length + '/' + s.candidateCount;
            document.getElementById('c-assembler').textContent =
              s.totalChars > 0 ? (s.totalChars / 1000).toFixed(1) + 'K' : '--';
          }
        } catch (e) {}

        try {
          const result = await chrome.storage.sync.get('geminiApiKey');
          const hasKey = !!result.geminiApiKey;
          document.getElementById('label-key').textContent = hasKey
            ? 'KEY OK'
            : 'NO KEY';
          document.getElementById('dot-key').style.background = hasKey
            ? '#82f76c'
            : '#ff716c';
        } catch (e) {}

        try {
          const comp = await chrome.runtime.sendMessage({
            type: 'nativeCompanionStatus',
          });
          if (comp && comp.success) {
            document.getElementById('label-companion').textContent =
              'COMPANION: ' + comp.state.connectionState.toUpperCase();
          }
        } catch (e) {}
      }

      fetchData();
      setInterval(fetchData, 4000);
    </script>
  </body>
</html>
