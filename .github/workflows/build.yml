name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  LEGAL_NOTICE_URL: ${{ vars.LEGAL_NOTICE_URL || 'https://example.com/legal' }}
  PRIVACY_POLICY_URL: ${{ vars.PRIVACY_POLICY_URL || 'https://example.com/privacy' }}
  LICENSE_URL: ${{ vars.LICENSE_URL || 'https://github.com/maceip/llm-sidebar-infinite-context/blob/main/LICENSE' }}

jobs:
  # ── 1. Build the Chrome extension + CRX ───────────────────────────────
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Pack CRX
        if: ${{ env.CRX_PRIVATE_KEY != '' }}
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: node build-scripts/pack-crx.js

      - name: Pack CRX (unsigned, for PRs)
        if: ${{ env.CRX_PRIVATE_KEY == '' }}
        run: node build-scripts/pack-crx.js --generate-key
        env:
          CRX_PRIVATE_KEY: ''

      - name: Zip dist for release
        run: cd dist && zip -r ../llm-sidebar-extension.zip . -x "*.crx" "*.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            dist/llm-sidebar.crx
            llm-sidebar-extension.zip

  # ── 2. Build native host + installer (matrix) ────────────────────────
  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
            native/overlay-companion/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('native/**/Cargo.lock') }}

      - name: Build native host
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-host

      - name: Build installer (CLI)
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-installer

      - name: Build installer (GUI)
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-installer --features gui

      - name: Build overlay companion
        if: runner.os != 'Linux'
        working-directory: native/overlay-companion
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp native/target/${{ matrix.target }}/release/llm-sidebar-host staging/
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer staging/
          if [ -f native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion ]; then
            cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion staging/
          fi

      - name: Stage artifacts (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp native/target/${{ matrix.target }}/release/llm-sidebar-host.exe staging/
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer.exe staging/
          if [ -f native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion.exe ]; then
            cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion.exe staging/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: staging/

  # ── 3. Build .deb package ─────────────────────────────────────────────
  deb:
    needs: [extension, native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-linux-amd64
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Build .deb
        run: |
          PKG=llm-sidebar
          VER=1.0.0
          ARCH=amd64
          ROOT=deb-root

          # Directory layout
          mkdir -p $ROOT/DEBIAN
          mkdir -p $ROOT/usr/lib/$PKG
          mkdir -p $ROOT/usr/bin

          # Binaries
          cp native-bin/llm-sidebar-host   $ROOT/usr/lib/$PKG/
          cp native-bin/llm-sidebar-installer $ROOT/usr/bin/
          chmod 755 $ROOT/usr/lib/$PKG/llm-sidebar-host
          chmod 755 $ROOT/usr/bin/llm-sidebar-installer

          # CRX
          cp ext/dist/llm-sidebar.crx $ROOT/usr/lib/$PKG/ 2>/dev/null || true

          # Control file
          cat > $ROOT/DEBIAN/control << 'CTRL'
          Package: llm-sidebar
          Version: 1.0.0
          Architecture: amd64
          Maintainer: maceip
          Description: LLM Sidebar Chrome extension with native messaging host
           AI sidebar for Chrome with infinite context via pinned tabs,
           agent memory, and a native messaging companion.
          CTRL
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' $ROOT/DEBIAN/control

          # postinst — register native host after install
          cat > $ROOT/DEBIAN/postinst << 'POST'
          #!/bin/sh
          set -e
          MANIFEST_DIR=/etc/opt/chrome/native-messaging-hosts
          mkdir -p "$MANIFEST_DIR"
          cat > "$MANIFEST_DIR/com.llm_sidebar.native_host.json" << MANIFEST
          {
            "name": "com.llm_sidebar.native_host",
            "description": "Native messaging host for LLM Sidebar",
            "path": "/usr/lib/llm-sidebar/llm-sidebar-host",
            "type": "stdio",
            "allowed_origins": [
              "chrome-extension://hecgmgkofmopdcjlbaegcaanaadhomhb/"
            ]
          }
          MANIFEST
          POST
          sed -i 's/^          //' $ROOT/DEBIAN/postinst
          chmod 755 $ROOT/DEBIAN/postinst

          # postrm — clean up on uninstall
          cat > $ROOT/DEBIAN/postrm << 'REM'
          #!/bin/sh
          set -e
          rm -f /etc/opt/chrome/native-messaging-hosts/com.llm_sidebar.native_host.json
          REM
          sed -i 's/^          //' $ROOT/DEBIAN/postrm
          chmod 755 $ROOT/DEBIAN/postrm

          dpkg-deb --build $ROOT ${PKG}_${VER}_${ARCH}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── 4a. Build macOS .dmg ───────────────────────────────────────────────
  dmg:
    needs: [extension, native]
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - artifact: macos-amd64
            arch: x86_64
          - artifact: macos-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Create .dmg
        run: |
          APP="LLM Sidebar"
          DMG_DIR=dmg-staging
          DMG_NAME=llm-sidebar-${{ matrix.artifact }}.dmg

          mkdir -p "$DMG_DIR/$APP"

          # Copy binaries
          cp native-bin/llm-sidebar-host "$DMG_DIR/$APP/"
          cp native-bin/llm-sidebar-installer "$DMG_DIR/$APP/"
          test -f native-bin/overlay-companion && cp native-bin/overlay-companion "$DMG_DIR/$APP/" || true

          # Copy CRX
          cp ext/dist/llm-sidebar.crx "$DMG_DIR/$APP/" 2>/dev/null || true

          # Make executable
          chmod +x "$DMG_DIR/$APP/"llm-sidebar-*
          test -f "$DMG_DIR/$APP/overlay-companion" && chmod +x "$DMG_DIR/$APP/overlay-companion" || true

          # Create a simple install script
          cat > "$DMG_DIR/$APP/install.command" << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo ""
          echo "  LLM SIDEBAR INSTALLER"
          echo "  ─────────────────────"
          echo ""
          ./llm-sidebar-installer install
          echo ""
          echo "  Press any key to close."
          read -n 1
          SCRIPT
          chmod +x "$DMG_DIR/$APP/install.command"

          # Create DMG
          hdiutil create -volname "$APP" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.artifact }}
          path: '*.dmg'

  # ── 4b. Build Windows .msi ───────────────────────────────────────────
  msi:
    needs: [extension, native]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-windows-amd64
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
        shell: pwsh

      - name: Create WiX source
        shell: bash
        run: |
          mkdir -p wix-staging
          cp native-bin/llm-sidebar-host.exe wix-staging/
          cp native-bin/llm-sidebar-installer.exe wix-staging/
          test -f native-bin/overlay-companion.exe && cp native-bin/overlay-companion.exe wix-staging/ || true
          cp ext/dist/llm-sidebar.crx wix-staging/ 2>/dev/null || true

          cat > wix-staging/Package.wxs << 'WXS'
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="LLM Sidebar"
                     Manufacturer="maceip"
                     Version="1.0.0"
                     UpgradeCode="a1b2c3d4-e5f6-7890-abcd-ef1234567890">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="INSTALLFOLDER" Name="LLMSidebar">
                  <Component Id="MainComponents" Guid="*">
                    <File Id="NativeHost" Source="llm-sidebar-host.exe" KeyPath="yes" />
                    <File Id="Installer" Source="llm-sidebar-installer.exe" />
                    <RegistryKey Root="HKCU"
                                 Key="Software\Google\Chrome\NativeMessagingHosts\com.llm_sidebar.native_host">
                      <RegistryValue Type="string" Value="[INSTALLFOLDER]com.llm_sidebar.native_host.json" />
                    </RegistryKey>
                  </Component>
                </Directory>
              </StandardDirectory>

              <Feature Id="MainFeature" Title="LLM Sidebar" Level="1">
                <ComponentRef Id="MainComponents" />
              </Feature>

              <!-- Run installer post-install to write manifest JSON -->
              <CustomAction Id="RunInstaller"
                            FileRef="Installer"
                            ExeCommand="install"
                            Execute="deferred"
                            Impersonate="yes"
                            Return="ignore" />

              <InstallExecuteSequence>
                <Custom Action="RunInstaller" After="InstallFiles">NOT Installed</Custom>
              </InstallExecuteSequence>
            </Package>
          </Wix>
          WXS

      - name: Build MSI
        shell: pwsh
        run: |
          cd wix-staging
          wix build Package.wxs -o ../llm-sidebar-windows-amd64.msi

      - uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: '*.msi'

  # ── 5. Bundle release archives ────────────────────────────────────────
  package:
    needs: [extension, native]
    strategy:
      matrix:
        include:
          - artifact: linux-amd64
            ext: tar.gz
          - artifact: windows-amd64
            ext: zip
          - artifact: macos-amd64
            ext: tar.gz
          - artifact: macos-arm64
            ext: tar.gz

    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Bundle archive
        run: |
          mkdir -p bundle
          cp native-bin/* bundle/
          cp ext/dist/llm-sidebar.crx bundle/ 2>/dev/null || true
          cp ext/llm-sidebar-extension.zip bundle/ 2>/dev/null || true

          NAME=llm-sidebar-${{ matrix.artifact }}
          if [ "${{ matrix.ext }}" = "tar.gz" ]; then
            tar czf ${NAME}.tar.gz -C bundle .
          else
            cd bundle && zip -r ../${NAME}.zip . && cd ..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: 'llm-sidebar-*.${{ matrix.ext }}'

  # ── 5. GitHub Release (only on tags) ──────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [package, deb, dmg, msi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.crx" -o -name "*.dmg" -o -name "*.msi" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  # ── 6. Publish to Chrome Web Store ────────────────────────────────────
  chrome-web-store:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ext/llm-sidebar-extension.zip
          extension-id: ${{ vars.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
