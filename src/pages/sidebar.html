<html>
  <head>
    <title>LLM Sidebar with Context</title>
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="status-bar" id="status-bar">
        <span class="status-pill active">
          <span class="status-dot"></span>
          Active
        </span>
        <span class="status-pill model" id="status-model">Flash Lite</span>
        <span class="status-pill memory" id="status-memory">
          <span class="status-dot"></span>
          0 memories
        </span>
        <span class="status-pill companion" id="status-companion" title="Native companion status">
          <span class="status-dot companion-dot" id="companion-dot"></span>
          <span id="companion-label">Companion</span>
        </span>
        <span class="status-pill model" id="native-overlay-status-pill">
          Overlay: checking
        </span>
      </div>

      <div id="messages"></div>

      <div id="native-overlay-panel" class="memory-panel">
        <button id="native-overlay-toggle" class="memory-panel-header expanded">
          <span class="memory-panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="14" x="5" y="5" rx="2" />
              <path d="M9 9h6" />
              <path d="M9 12h6" />
              <path d="M9 15h4" />
            </svg>
            Native Overlay
          </span>
          <span class="memory-panel-badge" id="native-overlay-status">Disconnected</span>
        </button>
        <div id="native-overlay-body" class="memory-panel-body">
          <div class="memory-indicator">
            <span class="memory-label" id="native-overlay-meta">Checking native companion...</span>
          </div>
          <div class="button-group" style="margin-top: 8px">
            <button id="show-native-overlay-button" title="Show native overlay">Show Overlay</button>
            <button id="hide-native-overlay-button" title="Hide native overlay">Hide Overlay</button>
          </div>
        </div>
      </div>

      <div id="memory-panel" class="memory-panel" style="display: none">
        <button id="memory-panel-toggle" class="memory-panel-header">
          <span class="memory-panel-title">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="m9 12 2 2 4-4" />
            </svg>
            AI Memory
          </span>
          <span class="memory-panel-badge" id="memory-badge">0 / 160</span>
          <svg
            class="memory-panel-chevron"
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m6 9 6 6 6-6" />
          </svg>
        </button>
        <div
          id="memory-panel-body"
          class="memory-panel-body"
          style="display: none"
        >
          <div
            id="memory-last-retrieval"
            class="memory-last-retrieval"
            style="display: none"
          >
            <div class="memory-section-label">Last Retrieval</div>
            <div id="memory-panel-viz" class="memory-panel-viz-container"></div>
          </div>
          <div class="memory-indicator">
            <span class="memory-label">Context Window</span>
            <div class="memory-bar">
              <div
                class="memory-bar-fill"
                id="memory-bar-fill"
                style="width: 0%"
              ></div>
            </div>
            <span class="memory-label" id="memory-count">0 / 160</span>
          </div>
          <div id="memory-episodes" class="memory-episodes"></div>
        </div>
      </div>

      <div class="bottom-panel">
        <div id="settings-panel">
          <div class="api-key-help">
            Get your API Key for free on
            <a href="https://aistudio.google.com/api-keys" target="_blank"
              >Google AI Studio</a
            >
            <div class="terms-text">
              Please read the API's
              <a href="https://ai.google.dev/gemini-api/terms" target="_blank"
                >terms of service</a
              >
            </div>
          </div>
          <div class="api-key-input-wrapper">
            <input
              type="password"
              id="api-key-input"
              placeholder="Enter your Gemini API Key"
            />
            <button id="save-api-key-button">Save</button>
          </div>
          <div id="legal-panel">
            <hr />
            <div class="legal-links">
              <a href="{{LEGAL_NOTICE_URL}}" target="_blank"
                >Legal Notice (Impressum)</a
              >
              <a href="{{PRIVACY_POLICY_URL}}" target="_blank"
                >Privacy Policy</a
              >
              <a href="{{LICENSE_URL}}" target="_blank">License</a>
            </div>
          </div>
        </div>

        <div id="pinned-tabs-container">
          <div id="current-tab"></div>
          <div id="pinned-tabs"></div>
        </div>

        <div id="controls-container">
          <select id="model-select">
            <option value="gemini-3-flash-preview">
              Gemini 3 Flash (Preview)
            </option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-flash-lite" selected>
              Gemini 2.5 Flash Lite
            </option>
          </select>
          <div class="button-group">
            <button id="agentdrop-button" title="Add Agent to Page">
              Agent Drop
            </button>
            <button id="new-chat-button" title="New Chat">New Chat</button>
            <button id="toggle-settings-button" title="Settings">
              Settings
            </button>
          </div>
        </div>

        <form id="prompt-form">
          <textarea
            id="prompt-input"
            placeholder="Ask anything..."
            rows="1"
          ></textarea>
          <button type="submit" id="send-button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="feather feather-send"
            >
              <path
                d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"
              />
              <path d="m21.854 2.147-10.94 10.939" />
            </svg>
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="../scripts/sidebar.js"></script>
  </body>
</html>
