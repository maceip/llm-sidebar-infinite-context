name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  LEGAL_NOTICE_URL: ${{ vars.LEGAL_NOTICE_URL || 'https://example.com/legal' }}
  PRIVACY_POLICY_URL: ${{ vars.PRIVACY_POLICY_URL || 'https://example.com/privacy' }}
  LICENSE_URL: ${{ vars.LICENSE_URL || 'https://github.com/maceip/llm-sidebar-infinite-context/blob/main/LICENSE' }}

jobs:
  # ── 1. Build the Chrome extension + CRX ───────────────────────────────
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Pack CRX
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            node build-scripts/pack-crx.js
          else
            echo "No CRX_PRIVATE_KEY secret set, generating throwaway key"
            node build-scripts/pack-crx.js --generate-key
          fi

      - name: Zip dist for release
        run: cd dist && zip -r ../llm-sidebar-extension.zip . -x "*.crx" "*.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            dist/llm-sidebar.crx
            llm-sidebar-extension.zip

  portable-bundles:
    needs: [extension]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_name: linux-x86
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundle_name: linux-arm
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_name: windows-x86
            archive_ext: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_name: windows-arm
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y             libxkbcommon-dev             libwayland-dev             libxrandr-dev             libxcursor-dev             libxi-dev             libxinerama-dev             libgl-dev             libegl-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
            native/overlay-companion/target
          key: portable-${{ matrix.target }}-cargo-${{ hashFiles('native/**/Cargo.lock') }}

      - name: Build installer
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-installer

      - name: Build overlay companion
        working-directory: native/overlay-companion
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage bundle (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bundle
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer bundle/
          cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion bundle/
          cp ext/dist/llm-sidebar.crx bundle/
          cp ext/llm-sidebar-extension.zip bundle/

      - name: Stage bundle (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bundle
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer.exe bundle/
          cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion.exe bundle/
          cp ext/dist/llm-sidebar.crx bundle/
          cp ext/llm-sidebar-extension.zip bundle/

      - name: Create tar.gz bundle
        if: matrix.archive_ext == 'tar.gz'
        run: tar czf "llm-sidebar-${{ matrix.bundle_name }}.tar.gz" -C bundle .

      - name: Create zip bundle
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path bundle\* -DestinationPath "llm-sidebar-${{ matrix.bundle_name }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.bundle_name }}
          path: |
            llm-sidebar-${{ matrix.bundle_name }}.${{ matrix.archive_ext }}

  # ── 2. Build native host + installer (matrix) ────────────────────────
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
            native/overlay-companion/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('native/**/Cargo.lock') }}

      - name: Build installer (CLI)
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-installer

      - name: Stage CLI installer before GUI build overwrites it (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer staging/llm-sidebar-installer-cli

      - name: Stage CLI installer before GUI build overwrites it (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp native/target/${{ matrix.target }}/release/llm-sidebar-installer.exe staging/llm-sidebar-installer-cli.exe

      - name: Build installer (GUI)
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p llm-sidebar-installer --features gui
        continue-on-error: true

      - name: Build overlay companion
        working-directory: native/overlay-companion
        run: cargo build --release --target ${{ matrix.target }}
        continue-on-error: true

      - name: Stage artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          if [ -f native/target/${{ matrix.target }}/release/llm-sidebar-installer ]; then
            cp native/target/${{ matrix.target }}/release/llm-sidebar-installer staging/
          fi
          if [ -f native/target/${{ matrix.target }}/release/llm-sidebar-installer-cli ]; then
            cp native/target/${{ matrix.target }}/release/llm-sidebar-installer-cli staging/
          fi
          if [ -f native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion ]; then
            cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion staging/
          fi

      - name: Stage artifacts (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          if [ -f native/target/${{ matrix.target }}/release/llm-sidebar-installer.exe ]; then
            cp native/target/${{ matrix.target }}/release/llm-sidebar-installer.exe staging/
          fi
          if [ -f native/target/${{ matrix.target }}/release/llm-sidebar-installer-cli.exe ]; then
            cp native/target/${{ matrix.target }}/release/llm-sidebar-installer-cli.exe staging/
          fi
          if [ -f native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion.exe ]; then
            cp native/overlay-companion/target/${{ matrix.target }}/release/overlay-companion.exe staging/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: staging/

  # ── 3. Build .deb package ─────────────────────────────────────────────
  deb:
    needs: [extension, native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-linux-amd64
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Build .deb
        run: |
          PKG=llm-sidebar
          VER=1.0.0
          ARCH=amd64
          ROOT=deb-root

          mkdir -p $ROOT/DEBIAN
          mkdir -p $ROOT/usr/lib/$PKG
          mkdir -p $ROOT/usr/bin

          cp native-bin/overlay-companion $ROOT/usr/lib/$PKG/
          if [ -f native-bin/llm-sidebar-installer-cli ]; then
            cp native-bin/llm-sidebar-installer-cli $ROOT/usr/bin/llm-sidebar-installer
          else
            cp native-bin/llm-sidebar-installer $ROOT/usr/bin/llm-sidebar-installer
          fi
          chmod 755 $ROOT/usr/lib/$PKG/overlay-companion
          chmod 755 $ROOT/usr/bin/llm-sidebar-installer

          cp ext/dist/llm-sidebar.crx $ROOT/usr/lib/$PKG/ 2>/dev/null || true

          cat > $ROOT/DEBIAN/control << 'CTRL'
          Package: llm-sidebar
          Version: 1.0.0
          Architecture: amd64
          Maintainer: maceip
          Description: LLM Sidebar Chrome extension with native messaging host
           AI sidebar for Chrome with infinite context via pinned tabs,
           agent memory, and a native messaging companion.
          CTRL
          sed -i 's/^          //' $ROOT/DEBIAN/control

          cat > $ROOT/DEBIAN/postinst << 'POST'
          #!/bin/sh
          set -e
          MANIFEST_DIR=/etc/opt/chrome/native-messaging-hosts
          mkdir -p "$MANIFEST_DIR"
          cat > "$MANIFEST_DIR/com.maceip.native_overlay_companion.json" << MANIFEST
          {
            "name": "com.maceip.native_overlay_companion",
            "description": "Native overlay companion for LLM Sidebar",
            "path": "/usr/lib/llm-sidebar/overlay-companion",
            "type": "stdio",
            "allowed_origins": [
              "chrome-extension://hecgmgkofmopdcjlbaegcaanaadhomhb/"
            ]
          }
          MANIFEST
          POST
          sed -i 's/^          //' $ROOT/DEBIAN/postinst
          chmod 755 $ROOT/DEBIAN/postinst

          cat > $ROOT/DEBIAN/postrm << 'REM'
          #!/bin/sh
          set -e
          rm -f /etc/opt/chrome/native-messaging-hosts/com.maceip.native_overlay_companion.json
          REM
          sed -i 's/^          //' $ROOT/DEBIAN/postrm
          chmod 755 $ROOT/DEBIAN/postrm

          dpkg-deb --build $ROOT ${PKG}_${VER}_${ARCH}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  # ── 4a. Build macOS .dmg ───────────────────────────────────────────────
  dmg:
    needs: [extension, native]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: macos-amd64
            arch: x86_64
          - artifact: macos-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Create .dmg
        run: |
          APP="LLM Sidebar"
          DMG_DIR=dmg-staging
          DMG_NAME=llm-sidebar-${{ matrix.artifact }}.dmg

          mkdir -p "$DMG_DIR/$APP"

          cp native-bin/overlay-companion "$DMG_DIR/$APP/"
          test -f native-bin/llm-sidebar-installer-cli && cp native-bin/llm-sidebar-installer-cli "$DMG_DIR/$APP/" || true
          test -f native-bin/llm-sidebar-installer && cp native-bin/llm-sidebar-installer "$DMG_DIR/$APP/" || true

          cp ext/dist/llm-sidebar.crx "$DMG_DIR/$APP/" 2>/dev/null || true

          chmod +x "$DMG_DIR/$APP/"llm-sidebar-*
          chmod +x "$DMG_DIR/$APP/overlay-companion"

          cat > "$DMG_DIR/$APP/install.command" << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo ""
          echo "  LLM SIDEBAR INSTALLER"
          echo "  ─────────────────────"
          echo ""
          # Prefer CLI installer
          if [ -f ./llm-sidebar-installer-cli ]; then
            ./llm-sidebar-installer-cli install
          else
            ./llm-sidebar-installer install
          fi
          echo ""
          echo "  Press any key to close."
          read -n 1
          SCRIPT
          chmod +x "$DMG_DIR/$APP/install.command"

          hdiutil create -volname "$APP" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.artifact }}
          path: '*.dmg'

  # ── 4b. Build Windows .msi ───────────────────────────────────────────
  msi:
    needs: [extension, native]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: native-windows-amd64
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
        shell: pwsh

      - name: Create WiX source
        shell: bash
        run: |
          mkdir -p wix-staging
          cp native-bin/overlay-companion.exe wix-staging/
          if [ -f native-bin/llm-sidebar-installer-cli.exe ]; then
            cp native-bin/llm-sidebar-installer-cli.exe wix-staging/llm-sidebar-installer.exe
          else
            cp native-bin/llm-sidebar-installer.exe wix-staging/
          fi
          cp ext/dist/llm-sidebar.crx wix-staging/ 2>/dev/null || true

          cat > wix-staging/Package.wxs << 'WXS'
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="LLM Sidebar"
                     Manufacturer="maceip"
                     Version="1.0.0"
                     UpgradeCode="a1b2c3d4-e5f6-7890-abcd-ef1234567890">

              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <StandardDirectory Id="LocalAppDataFolder">
                <Directory Id="INSTALLFOLDER" Name="LLMSidebar">
                  <Component Id="MainComponents" Guid="*">
                    <File Id="NativeHost" Source="overlay-companion.exe" KeyPath="yes" />
                    <File Id="Installer" Source="llm-sidebar-installer.exe" />
                    <RegistryKey Root="HKCU"
                                 Key="Software\Google\Chrome\NativeMessagingHosts\com.maceip.native_overlay_companion">
                      <RegistryValue Type="string" Value="[INSTALLFOLDER]com.maceip.native_overlay_companion.json" />
                    </RegistryKey>
                  </Component>
                </Directory>
              </StandardDirectory>

              <Feature Id="MainFeature" Title="LLM Sidebar" Level="1">
                <ComponentRef Id="MainComponents" />
              </Feature>

              <CustomAction Id="RunInstaller"
                            FileRef="Installer"
                            ExeCommand="install"
                            Execute="deferred"
                            Impersonate="yes"
                            Return="ignore" />

              <InstallExecuteSequence>
                <Custom Action="RunInstaller" After="InstallFiles">NOT Installed</Custom>
              </InstallExecuteSequence>
            </Package>
          </Wix>
          WXS

      - name: Build MSI
        shell: pwsh
        run: |
          cd wix-staging
          wix build Package.wxs -o ../llm-sidebar-windows-amd64.msi

      - uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: '*.msi'

  # ── 5. Bundle release archives ────────────────────────────────────────
  package:
    needs: [extension, native]
    strategy:
      matrix:
        include:
          - artifact: linux-amd64
            ext: tar.gz
          - artifact: windows-amd64
            ext: zip
          - artifact: macos-amd64
            ext: tar.gz
          - artifact: macos-arm64
            ext: tar.gz

    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: native-bin/

      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Bundle archive
        run: |
          mkdir -p bundle
          cp native-bin/* bundle/
          cp ext/dist/llm-sidebar.crx bundle/ 2>/dev/null || true
          cp ext/llm-sidebar-extension.zip bundle/ 2>/dev/null || true

          NAME=llm-sidebar-${{ matrix.artifact }}
          if [ "${{ matrix.ext }}" = "tar.gz" ]; then
            tar czf ${NAME}.tar.gz -C bundle .
          else
            cd bundle && zip -r ../${NAME}.zip . && cd ..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: 'llm-sidebar-*.${{ matrix.ext }}'

  # ── 6. GitHub Release (only on tags) ──────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [package, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Also grab optional platform installers if they succeeded
      - uses: actions/download-artifact@v4
        with:
          name: msi-package
          path: artifacts/msi/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dmg-macos-amd64
          path: artifacts/dmg-amd64/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: dmg-macos-arm64
          path: artifacts/dmg-arm64/
        continue-on-error: true

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.crx" -o -name "*.dmg" -o -name "*.msi" \) -exec cp {} release/ \;
          echo "=== Release artifacts ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  # ── 7. Publish to Chrome Web Store ────────────────────────────────────
  chrome-web-store:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension
          path: ext/

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ext/llm-sidebar-extension.zip
          extension-id: ${{ vars.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
